<!DOCTYPE html>\
<html lang="pt-BR">\
<head>\
    <meta charset="UTF-8">\
    <title>Dashboard - Next-ESG</title>\
    <style>\
        body \{ font-family: sans-serif; background: #f0f2f5; padding: 30px; \}\
        .grid \{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; \}\
        .card \{ background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); \}\
        .big-num \{ font-size: 32px; font-weight: bold; color: #1976D2; \}\
    </style>\
</head>\
<body>\
    <h1>Dashboard do Evento</h1>\
    <div class="grid">\
        <div class="card"><p>Participantes</p><div class="big-num">156 / 500</div></div>\
        <div class="card"><p>Total Neutralizado</p><div class="big-num">8.34 tCO\uc0\u8322 e</div></div>\
        <div class="card"><p>Engajamento</p><div class="big-num">31%</div></div>\
    </div>\
</body>\
</html>}
