<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-ESG - Neutralização Detalhada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .logo { font-size: 24px; font-weight: 700; color: #2E7D32; }
        .logo span { color: #1976D2; }
        .btn-back { display: flex; align-items: center; gap: 8px; color: #666; text-decoration: none; font-size: 14px; font-weight: 500; }
        .btn-back:hover { color: #1976D2; }
        .page-header { background: white; border-radius: 16px; padding: 32px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06); }
        .page-tag { display: inline-block; background: #E3F2FD; color: #1565C0; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
        .page-title { font-size: 28px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
        .page-description { color: #666; font-size: 14px; line-height: 1.6; }
        .progress-container { background: white; border-radius: 16px; padding: 24px 32px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06); }
        .progress-steps { display: flex; justify-content: space-between; position: relative; }
        .progress-steps::before { content: ''; position: absolute; top: 20px; left: 0; right: 0; height: 2px; background: #e0e0e0; z-index: 0; }
        .progress-line { position: absolute; top: 20px; left: 0; height: 2px; background: #1976D2; z-index: 1; transition: width 0.3s ease; }
        .step { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; flex: 1; }
        .step-circle { width: 40px; height: 40px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; color: #999; margin-bottom: 8px; transition: all 0.3s ease; }
        .step.active .step-circle { background: #1976D2; color: white; box-shadow: 0 4px 12px rgba(25, 118, 210, 0.3); }
        .step.completed .step-circle { background: #2E7D32; color: white; }
        .step-label { font-size: 12px; color: #999; text-align: center; font-weight: 500; }
        .step.active .step-label { color: #1976D2; font-weight: 600; }
        .step.completed .step-label { color: #2E7D32; }
        .form-container { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06); }
        .step-content { display: none; }
        .step-content.active { display: block; }
        .form-section { margin-bottom: 32px; }
        .section-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 8px; }
        .form-row { display: flex; gap: 16px; margin-bottom: 20px; }
        .form-group { flex: 1; }
        .form-group.half { flex: 0 0 calc(50% - 8px); }
        label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 8px; }
        label .required { color: #E53935; }
        input, select { width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; background: #fafafa; }
        input:focus, select:focus { outline: none; border-color: #1976D2; background: white; box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1); }
        .form-actions { display: flex; gap: 16px; margin-top: 32px; padding-top: 24px; border-top: 1px solid #eee; }
        .btn { padding: 16px 24px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-secondary { flex: 1; border: 1px solid #ddd; background: white; color: #666; }
        .btn-outline { flex: 1; border: 1px solid #1976D2; background: white; color: #1976D2; }
        .btn-primary { flex: 2; border: none; background: #1976D2; color: white; }
        .btn-success { flex: 2; border: none; background: #2E7D32; color: white; }
        .summary-card { background: #f5f5f5; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e0e0e0; }
        @media (max-width: 600px) { .form-row { flex-direction: column; } .form-actions { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">NEXT<span>-ESG</span></div>
            <a href="javascript:void(0)" class="btn-back" onclick="history.back()">← Voltar</a>
        </div>

        <div class="page-header">
            <span class="page-tag">📊 Detalhada</span>
            <h1 class="page-title">Neutralização Detalhada</h1>
        </div>

        <div class="progress-container">
            <div class="progress-steps">
                <div class="progress-line" id="progressLine" style="width: 0%;"></div>
                <div class="step active" data-step="1"><div class="step-circle">1</div><div class="step-label">Dados</div></div>
                <div class="step" data-step="2"><div class="step-circle">2</div><div class="step-label">Logística</div></div>
                <div class="step" data-step="3"><div class="step-circle">3</div><div class="step-label">Energia</div></div>
                <div class="step" data-step="4"><div class="step-circle">4</div><div class="step-label">Resíduos</div></div>
            </div>
        </div>

        <form class="form-container" action="resultado.html" method="get" id="detailedForm">
            <!-- ETAPA 1 -->
            <div class="step-content active" id="step-1">
                <div class="form-section">
                    <h3 class="section-title">📋 Informações do Cliente</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nome do Cliente <span class="required">*</span></label>
                            <input type="text" placeholder="Razão social" required>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="history.back()">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="nextStep(2)">Próximo →</button>
                </div>
            </div>

            <!-- ETAPA 2 -->
            <div class="step-content" id="step-2">
                <div class="form-section">
                    <h3 class="section-title">🚗 Logística</h3>
                    <div class="form-row">
                        <div class="form-group half">
                            <label>Número de Convidados <span class="required">*</span></label>
                            <input type="number" placeholder="Ex: 500" required>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" onclick="prevStep(1)">← Voltar</button>
                    <button type="button" class="btn btn-primary" onclick="nextStep(3)">Próximo →</button>
                </div>
            </div>

            <!-- ETAPA 3 -->
            <div class="step-content" id="step-3">
                <div class="form-section">
                    <h3 class="section-title">⚡ Energia</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Consumo (kWh) <span class="required">*</span></label>
                            <input type="number" placeholder="Ex: 5000" required>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" onclick="prevStep(2)">← Voltar</button>
                    <button type="button" class="btn btn-primary" onclick="nextStep(4)">Próximo →</button>
                </div>
            </div>

            <!-- ETAPA 4 -->
            <div class="step-content" id="step-4">
                <div class="form-section">
                    <h3 class="section-title">🗑️ Resíduos e Resumo</h3>
                    <div class="summary-card">
                        <div class="summary-row"><span>Confirme os dados antes de calcular.</span></div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" onclick="prevStep(3)">← Voltar</button>
                    <button type="submit" class="btn btn-success">Calcular Emissões</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        function nextStep(step) {
            // Esconde todas as etapas
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            // Mostra a etapa atual
            const target = document.getElementById('step-' + step);
            if (target) target.classList.add('active');

            // Atualiza os círculos de progresso
            document.querySelectorAll('.step').forEach(el => {
                const stepNum = parseInt(el.getAttribute('data-step'));
                el.classList.remove('active', 'completed');
                
                if (stepNum < step) {
                    el.classList.add('completed');
                } else if (stepNum === step) {
                    el.classList.add('active');
                }
            });

            // Atualiza a linha azul
            const progress = ((step - 1) / 3) * 100;
            document.getElementById('progressLine').style.width = progress + '%';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function prevStep(step) {
            nextStep(step);
        }
    </script>
</body>
</html>
