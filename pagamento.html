<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pagamento - Next-ESG</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .pay-form { width: 400px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn { width: 100%; padding: 15px; background: #1976D2; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="pay-form">
        <h3>Pagamento com Cartão</h3>
        <input type="text" placeholder="Número do Cartão">
        <input type="text" placeholder="Nome no Cartão">
        <div style="display:flex; gap:10px;">
            <input type="text" placeholder="MM/AA">
            <input type="text" placeholder="CVV">
        </div>
        <button class="btn" onclick="location.href='certificado.html'">Confirmar Pagamento</button>
    </div>
</body>
</html>
