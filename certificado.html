<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-ESG - Certificado de Neutralização</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #2E7D32;
        }

        .logo span {
            color: #1976D2;
        }

        .success-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #E8F5E9;
            color: #2E7D32;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .certificate-wrapper {
            background: white;
            border-radius: 20px;
            padding: 60px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .certificate-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #2E7D32, #1976D2, #F9A825);
        }

        .certificate {
            border: 3px solid #E8F5E9;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
        }

        .certificate-header {
            margin-bottom: 32px;
        }

        .certificate-logo {
            font-size: 32px;
            font-weight: 700;
            color: #2E7D32;
            margin-bottom: 8px;
        }

        .certificate-logo span {
            color: #1976D2;
        }

        .certificate-subtitle {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .certificate-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .certificate-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #2E7D32, #1976D2);
            margin: 24px auto;
        }

        .certificate-body {
            color: #444;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 32px;
        }

        .certificate-event {
            font-size: 24px;
            font-weight: 700;
            color: #2E7D32;
            margin: 16px 0;
        }
